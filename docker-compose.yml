services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: core
      POSTGRES_PASSWORD: core
      POSTGRES_DB: core_api
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core -d core_api"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://core:core@db:5432/core_api
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-string-min-32}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      CF_TURN_KEY_ID: ${CF_TURN_KEY_ID}
      CF_TURN_API_TOKEN: ${CF_TURN_API_TOKEN}
    ports:
      - "3000:3000"

volumes:
  pgdata:
